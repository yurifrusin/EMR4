<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=Edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>EMR — Diary</title>
  <script type="text/javascript" src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  <link rel="stylesheet" href="diary.css?v=48" />
  <script src="diary.js?v=48" defer></script>
</head>
<body>

<!-- ═══ HEADER ══════════════════════════════════════════ -->
<div id="diary-header">
  <div class="diary-logo">
    <img src="../images/emr_cube1.png" width="28" height="28" alt="" />
    <div>
      <div class="diary-logo-text">EMR — Diary</div>
      <div class="diary-logo-sub" id="diary-practice-name">Loading…</div>
    </div>
  </div>

  <div class="diary-date-nav">
    <button id="btn-prev-day" title="Previous day">&#8249;</button>
    <div class="date-picker-wrapper">
      <span id="diary-date-label" title="Select date">—</span>
      <input type="date" id="diary-date-picker" aria-label="Select diary date" />
      <button id="btn-calendar" title="Select date" aria-label="Select date">&#128197;</button>
    </div>
    <button id="btn-next-day" title="Next day">&#8250;</button>
    <button id="btn-today" title="Go to today">Today</button>
    <button id="btn-now" title="Jump to the current time">Now</button>
  </div>

  <div class="diary-actions">
    <button id="btn-refresh" title="Refresh appointments">&#8635; Refresh</button>
    <span id="diary-status">Connecting…</span>
  </div>
</div>

<!-- ═══ GRID ═════════════════════════════════════════════ -->
<div id="diary-body">
  <div id="diary-loading">
    <div class="spinner"></div>
  </div>
  <div id="diary-error" class="hidden"></div>

  <div id="diary-grid" class="hidden"></div>
</div>

<!-- ═══ BREAK EDIT MODAL ════════════════════════════════ -->
<div id="break-modal" class="break-modal hidden" role="dialog" aria-modal="true">
  <div class="break-modal-inner">
    <div class="break-modal-header">
      <span id="break-modal-title" class="break-modal-title">Edit Breaks</span>
      <button id="btn-modal-close" class="break-modal-close" title="Close">✕</button>
    </div>
    <p class="break-modal-hint">Cells within a break window show the break label instead of a bookable slot.</p>
    <div id="break-modal-body" class="break-modal-body"></div>
    <div class="break-modal-footer">
      <button id="btn-modal-add" class="btn-ghost-sm">+ Add break</button>
      <button id="btn-modal-save" class="btn-primary-sm">Save</button>
    </div>
  </div>
</div>

<!-- ═══ BOOKING CREATE/EDIT MODAL ═══════════════════════ -->
<div id="booking-modal" class="break-modal hidden" role="dialog" aria-modal="true">
  <div class="break-modal-inner">
    <div class="break-modal-header">
      <span id="booking-modal-title" class="break-modal-title">New Appointment</span>
      <button id="btn-booking-close" class="break-modal-close" title="Close">✕</button>
    </div>
    <div class="booking-modal-body">
      <form id="booking-form" onsubmit="return false;">
        <div class="form-group">
          <label for="booking-patient-search">Patient Search:</label>
          <div class="patient-search-container">
            <input type="text" id="booking-patient-search" placeholder="Type name, DOB, Medicare..." autocomplete="off" />
            <div id="patient-search-results" class="search-results-dropdown hidden"></div>
          </div>
          <div id="selected-patient-display" class="selected-item-display hidden">
            <span id="selected-patient-text"></span>
            <button id="btn-clear-patient" type="button" class="btn-clear" title="Clear selected patient">✕</button>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="booking-practitioner">Practitioner / Room:</label>
            <select id="booking-practitioner" required></select>
          </div>
          <div class="form-group">
            <label for="booking-type">Appointment Type:</label>
            <select id="booking-type"></select>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="booking-date">Date:</label>
            <input type="date" id="booking-date" required />
          </div>
          <div class="form-group">
            <label for="booking-time">Time:</label>
            <input type="time" id="booking-time" required />
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="booking-duration">Duration (mins):</label>
            <input type="number" id="booking-duration" min="5" max="480" step="5" required />
          </div>
          <div class="form-group">
            <label for="booking-status">Status:</label>
            <select id="booking-status">
              <option value="Booked">Booked</option>
              <option value="Confirmed">Confirmed</option>
              <option value="Arrived">Arrived</option>
              <option value="InConsult">In Consult</option>
              <option value="Completed">Done</option>
              <option value="Cancelled">Cancelled</option>
              <option value="NoShow">No Show</option>
              <option value="DNA">DNA</option>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label for="booking-reason">Reason for Visit / Note for Doctor:</label>
          <input type="text" id="booking-reason" placeholder="e.g. Script, checkup" />
        </div>
        
        <div id="booking-error" class="form-error hidden"></div>
      </form>
    </div>
    <div class="break-modal-footer">
      <button id="btn-booking-delete" type="button" class="btn-danger-sm hidden" title="Cancel this whole appointment">Cancel Appointment</button>
      <div style="flex-grow: 1;"></div>
      <button id="btn-booking-save" class="btn-primary-sm">Save Booking</button>
    </div>
  </div>
</div>

</body>
</html>
