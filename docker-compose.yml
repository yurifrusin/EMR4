services:
  db:
    image: pgvector/pgvector:pg16
    container_name: gp-pms-postgres
    ports:
      - "0.0.0.0:5434:5432"
    environment:
      POSTGRES_DB: gp_pms_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
